version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: price_monitor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: price_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d price_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
